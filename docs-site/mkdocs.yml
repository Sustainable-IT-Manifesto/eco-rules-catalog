site_name: Eco Rules Catalog
site_description: Human-readable documentation for the Eco Rules Catalog

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.path
    - toc.follow
    - search.highlight
    - search.share
    - search.suggest
  palette:
    scheme: default
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - fenced_code
  - admonition

plugins:
  - search

extra:
  version:
    provider: mike

nav:
  - Home: index.md
  - Catalog:
      - Catalog Index: catalog/index.md
      - Search: catalog/search.md
  - Ontology:
      - Overview: ontology/index.md
      - Browser: ontology/browser.md
  - Contributing: contributing.md
