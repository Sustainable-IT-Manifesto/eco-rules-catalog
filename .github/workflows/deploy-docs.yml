name: deploy-docs

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install mkdocs mkdocs-material jsonschema

      - name: Build catalog
        run: python tools/build_catalog.py

      - name: Validate registry
        run: python tools/validate_registry.py

      - name: Validate rules
        run: python tools/validate_rules_v2.py catalog/master.json

      - name: Generate human catalog
        run: python tools/generate_human_catalog_v2.py

      - name: Guard generated catalog
        run: |
          git diff --exit-code -- catalog/master.json ||                   (echo "catalog/master.json is out of sync. Regenerate and commit it." && exit 1)

      - name: Guard generated docs
        run: |
          git diff --exit-code -- docs/catalog ||                   (echo "docs/catalog is out of sync. Regenerate and commit it." && exit 1)

      - name: Build docs
        run: mkdocs build -f mkdocs.yml --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
