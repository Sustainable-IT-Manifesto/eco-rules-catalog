name: Per-rule build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'catalog/rules/**'
      - 'tools/build_catalog.py'
      - 'tools/generate_human_catalog_v2.py'
      - 'catalog/registry.json'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build catalog
        run: python tools/build_catalog.py --root . --base-catalog master.json --out catalog/master.json
      - name: Generate human catalog
        run: python tools/generate_human_catalog_v2.py --root . --out eco_catalog_human_v2 --registry catalog/registry.json
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eco-catalog-generated
          path: |
            catalog/master.json
            eco_catalog_human_v2/
